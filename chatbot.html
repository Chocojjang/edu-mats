<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>당신의 꿈과 함께하는 챗봇</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    #app {
      width: 100%;
      max-width: 1200px;
      height: 90vh;
      max-height: 820px;
      display: flex;
      flex-direction: column;
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e5e5e0;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }

    /* 헤더 */
    #header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 20px;
      border-bottom: 1px solid #e5e5e0;
      background: #fafaf8;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    #header h1 span.icon { font-size: 18px; }
    #reset-btn {
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 8px;
      border: 1px solid #d0d0c8;
      background: transparent;
      color: #666;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: background 0.15s;
    }
    #reset-btn:hover { background: #f0f0ea; }

    /* 메시지 영역 */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scroll-behavior: smooth;
    }
    #messages::-webkit-scrollbar { width: 5px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #d0d0c8; border-radius: 10px; }

    /* 메시지 버블 */
    .msg {
      display: flex;
      gap: 10px;
      max-width: 85%;
    }
    .msg.user {
      align-self: flex-end;
      flex-direction: row-reverse;
    }
    .msg.assistant { align-self: flex-start; }

    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
    }
    .msg.user .avatar { background: #d5d2f8; color: #3c3489; }
    .msg.assistant .avatar { background: #9fe1cb; color: #085041; }

    .bubble {
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.65;
      border: 1px solid #e5e5e0;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg.user .bubble {
      background: #eeedfe;
      border-color: #b8b4f0;
      color: #26215c;
      border-radius: 14px 2px 14px 14px;
    }
    .msg.assistant .bubble {
      background: #f7f7f4;
      color: #1a1a1a;
      border-radius: 2px 14px 14px 14px;
    }
    .bubble.error {
      background: #fcebeb;
      border-color: #f09595;
      color: #501313;
    }

    /* 타이핑 애니메이션 */
    .typing {
      display: flex;
      gap: 5px;
      padding: 3px 0;
      align-items: center;
    }
    .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #999;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-7px); }
    }

    /* 입력 영역 */
    #input-area {
      padding: 12px 16px;
      border-top: 1px solid #e5e5e0;
      background: #ffffff;
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #user-input {
      flex: 1;
      resize: none;
      padding: 9px 13px;
      font-size: 14px;
      font-family: inherit;
      border-radius: 10px;
      border: 1px solid #d0d0c8;
      background: #fafaf8;
      color: #1a1a1a;
      line-height: 1.5;
      min-height: 42px;
      max-height: 110px;
      outline: none;
      transition: border-color 0.15s, background 0.15s;
    }
    #user-input:focus {
      border-color: #7f77dd;
      background: #ffffff;
    }
    #user-input::placeholder { color: #aaa; }

    #send-btn {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      border: 1px solid #b8b4f0;
      background: #eeedfe;
      color: #3c3489;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s;
    }
    #send-btn:hover { background: #d5d2f8; }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
    #send-btn svg { pointer-events: none; }

    /* 날짜 구분선 */
    .divider {
      text-align: center;
      font-size: 11px;
      color: #aaa;
      margin: 4px 0;
      position: relative;
    }
    .divider::before, .divider::after {
      content: "";
      display: inline-block;
      width: 60px;
      height: 1px;
      background: #e0e0d8;
      vertical-align: middle;
      margin: 0 8px;
    }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <h1><span class="icon"></span>당신의 꿈과 함께하는 챗봇</h1>
    <button id="reset-btn">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M1 4v6h6M23 20v-6h-6"/>
        <path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4-4.64 4.36A9 9 0 0 1 3.51 15"/>
      </svg>
      새 대화
    </button>
  </div>

  <div id="messages">
    <div class="divider">대화 시작</div>
    <div class="msg assistant">
      <div class="avatar">AI</div>
      <div class="bubble">안녕하세요! 무엇을 도와드릴까요? 😊</div>
    </div>
  </div>

  <div id="input-area">
    <textarea id="user-input" placeholder="메시지를 입력하세요… (Enter 전송 / Shift+Enter 줄바꿈)" rows="1"></textarea>
    <button id="send-btn" aria-label="전송">
      <svg width="17" height="17" fill="none" stroke="currentColor" stroke-width="2.2" viewBox="0 0 24 24">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>

<script>
  const API_KEY = "app-nA9bL4Jvi58v6SeAH4kSYN09";
  const API_URL = "https://api.dify.ai/v1/chat-messages";

  let conversationId = "";
  let isLoading = false;

  const messagesEl = document.getElementById("messages");
  const inputEl = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  const resetBtn = document.getElementById("reset-btn");

  function scrollBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, content, isError = false) {
    const wrap = document.createElement("div");
    wrap.className = `msg ${role}`;

    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "나" : "AI";

    const bubble = document.createElement("div");
    bubble.className = "bubble" + (isError ? " error" : "");
    bubble.textContent = content;

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollBottom();
    return wrap;
  }

  function showTyping() {
    const wrap = document.createElement("div");
    wrap.className = "msg assistant";
    wrap.id = "typing-indicator";
    wrap.innerHTML = `
      <div class="avatar">AI</div>
      <div class="bubble">
        <div class="typing">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>`;
    messagesEl.appendChild(wrap);
    scrollBottom();
  }

  function removeTyping() {
    const el = document.getElementById("typing-indicator");
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;

    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    inputEl.style.height = "auto";

    addMessage("user", text);
    showTyping();

    try {
      const payload = {
        query: text,
        inputs: {},
        response_mode: "blocking",
        user: "html-user"
      };
      if (conversationId) payload.conversation_id = conversationId;

      const res = await fetch(API_URL, {
        method: "POST",
        headers: {
          "Authorization": `Bearer ${API_KEY}`,
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      removeTyping();

      if (res.ok) {
        const data = await res.json();
        if (data.conversation_id) conversationId = data.conversation_id;
        addMessage("assistant", data.answer || "응답을 받지 못했습니다.");
      } else if (res.status === 401) {
        addMessage("assistant", "❌ API 키가 잘못되었습니다. 코드에서 API_KEY를 확인해 주세요.", true);
      } else {
        const errData = await res.json().catch(() => ({}));
        addMessage("assistant", `❌ API 오류 ${res.status}: ${errData.message || res.statusText}`, true);
      }
    } catch (e) {
      removeTyping();
      if (e.name === "TypeError" && e.message.includes("fetch")) {
        addMessage("assistant", "❌ 네트워크 오류 또는 CORS 차단입니다.\nDify 앱 설정에서 CORS를 허용하거나, 로컬 서버(VS Code Live Server 등)를 통해 열어 주세요.", true);
      } else {
        addMessage("assistant", `❌ 오류: ${e.message}`, true);
      }
    }

    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener("click", sendMessage);

  inputEl.addEventListener("keydown", e => {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  inputEl.addEventListener("input", () => {
    inputEl.style.height = "auto";
    inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + "px";
  });

  resetBtn.addEventListener("click", () => {
    conversationId = "";
    messagesEl.innerHTML = "";
    const divider = document.createElement("div");
    divider.className = "divider";
    divider.textContent = "새 대화 시작";
    messagesEl.appendChild(divider);
    addMessage("assistant", "새 대화가 시작되었습니다. 무엇을 도와드릴까요? 😊");
  });
</script>

</body>
</html>
