<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대학교 입시 지도 검색</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans KR',sans-serif;background:#f0f4f8;height:100vh;display:flex;flex-direction:column;}
#topbar{background:linear-gradient(135deg,#1565C0,#0D47A1);color:white;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;box-shadow:0 2px 8px rgba(0,0,0,.2);}
#topbar h1{font-size:1.15em;font-weight:700;white-space:nowrap;}
#search-wrap{flex:1;min-width:200px;max-width:360px;position:relative;}
#searchInput{width:100%;padding:9px 16px;border-radius:24px;border:none;font-size:.95em;font-family:inherit;outline:none;}
#suggestions{position:absolute;top:calc(100% + 4px);left:0;right:0;background:white;border-radius:10px;box-shadow:0 4px 20px rgba(0,0,0,.15);z-index:9999;max-height:280px;overflow-y:auto;display:none;}
.sug-item{padding:10px 16px;cursor:pointer;font-size:.9em;color:#222;border-bottom:1px solid #f0f0f0;display:flex;justify-content:space-between;align-items:center;}
.sug-item:last-child{border-bottom:none;}
.sug-item:hover,.sug-item.active{background:#e3f2fd;}
.sug-tag{font-size:.75em;color:#888;background:#f5f5f5;padding:2px 7px;border-radius:10px;}
#filter-wrap{display:flex;gap:8px;flex-wrap:wrap;}
select.filt{padding:7px 12px;border-radius:20px;border:none;background:rgba(255,255,255,.2);color:white;font-size:.82em;font-family:inherit;cursor:pointer;outline:none;}
select.filt option{background:#1565C0;color:white;}
#main{flex:1;display:flex;min-height:0;}
#map{flex:1;}
#sidebar{width:300px;background:white;overflow-y:auto;display:flex;flex-direction:column;box-shadow:-2px 0 8px rgba(0,0,0,.08);}
#sidebar-content{flex:1;padding:16px;}
.empty-state{text-align:center;color:#aaa;padding:40px 20px;font-size:.9em;line-height:1.8;}
.empty-state .icon{font-size:2.5em;margin-bottom:10px;}
.uni-card{background:#f8faff;border:1.5px solid #e3eaff;border-radius:10px;padding:16px;margin-bottom:12px;}
.uni-card .utype{font-size:.72em;font-weight:700;color:#1565C0;letter-spacing:.05em;margin-bottom:4px;}
.uni-card .uname{font-size:1.1em;font-weight:700;color:#1a1a2e;margin-bottom:6px;}
.uni-card .umeta{font-size:.8em;color:#666;margin-bottom:10px;display:flex;gap:8px;flex-wrap:wrap;}
.meta-badge{background:#eef2ff;color:#3949ab;padding:2px 8px;border-radius:10px;}
.btn-row{display:flex;gap:8px;}
.btn-link{flex:1;padding:7px;border-radius:8px;font-size:.8em;font-weight:600;text-align:center;text-decoration:none;cursor:pointer;border:none;font-family:inherit;}
.btn-info{background:#1565C0;color:white;}
.btn-home{background:#f0f4ff;color:#1565C0;border:1.5px solid #c5d5ff;}
.btn-dis{background:#e9e9e9;color:#aaa;cursor:not-allowed;}
.btn-row a{color:white;text-decoration:none;}
.btn-row .btn-home{color:#1565C0!important;}

#count-bar{background:#e8f0fe;padding:8px 16px;font-size:.82em;color:#1565C0;font-weight:500;border-bottom:1px solid #c5d5ff;}
.leaflet-popup-content-wrapper{border-radius:10px!important;box-shadow:0 4px 16px rgba(0,0,0,.15)!important;}
.leaflet-popup-content{margin:10px 14px!important;font-family:'Noto Sans KR',sans-serif!important;}
.popup-name{font-weight:700;font-size:1em;color:#1a1a2e;margin-bottom:4px;}
.popup-meta{font-size:.8em;color:#666;margin-bottom:8px;}
.popup-link{display:inline-block;padding:5px 12px;background:#1565C0;color:#ffffff!important;border-radius:6px;font-size:.8em;text-decoration:none!important;font-weight:600;margin-right:6px;}
.popup-link.home{background:#f0f4ff;color:#1565C0!important;border:1px solid #c5d5ff;}
</style>
</head>
<body>

<div id="topbar">
  <h1>대학교 입학정보 지도</h1>
  <div id="search-wrap">
    <input type="text" id="searchInput" placeholder="대학명 검색 (2글자 이상)..." autocomplete="off">
    <div id="suggestions"></div>
  </div>
  <button id="resetBtn" onclick="resetSearch()" style="background:rgba(255,255,255,0.25);border:1.5px solid rgba(255,255,255,0.6);color:white;border-radius:20px;padding:7px 14px;font-size:.85em;font-family:inherit;cursor:pointer;white-space:nowrap;flex-shrink:0;display:none;">✕ 초기화</button>
  <div id="filter-wrap">
    <select class="filt" id="filtRegion">
      <option value="">전체 지역</option>
    </select>
    <select class="filt" id="filtType">
      <option value="">전체 유형</option>
    </select>
    <select class="filt" id="filtEstab">
      <option value="">전체 설립</option>
    </select>
  </div>
</div>

<div id="main">
  <div id="map"></div>
  <div id="sidebar">
    <div id="count-bar">전체 <strong id="countNum">387</strong>개 대학</div>
    <div id="sidebar-content">
      <div class="empty-state">
        <div class="icon">🗺️</div>
        지도에서 마커를 클릭하거나<br>대학명을 검색해 보세요.
      </div>
    </div>
  </div>
</div>

;

// ── 지도 초기화
const map = L.map('map').setView([36.5, 127.8], 7);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors', maxZoom: 18
}).addTo(map);

// ── 필터 옵션 채우기
const regions = [...new Set(DATA.map(d=>d.region))].sort();
const types   = [...new Set(DATA.map(d=>d.type))].sort();
const estabs  = [...new Set(DATA.map(d=>d.establish))].sort();
const fillSel = (id, arr) => {
  const sel = document.getElementById(id);
  arr.forEach(v => { const o=document.createElement('option'); o.value=v; o.textContent=v; sel.appendChild(o); });
};
fillSel('filtRegion', regions);
fillSel('filtType',   types);
fillSel('filtEstab',  estabs);

// ── 아이콘
function makeIcon(color, selected) {
  const c = selected ? '#e53935' : color;
  const sz = selected ? 36 : 28;
  return L.divIcon({
    className: '',
    html: `<div style="width:${sz}px;height:${sz}px;background:${c};border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,.3);"></div>`,
    iconSize: [sz, sz], iconAnchor: [sz/2, sz]
  });
}
const typeColor = {
  '일반대학':'#1565C0','교육대학':'#2E7D32','전문대학':'#6A1B9A',
  '산업대학':'#E65100','기능대학':'#37474F','사이버대학(대학)':'#00838F',
  '사이버대학(전문)':'#00695C','원격대학(대학)':'#558B2F','원격대학(전문)':'#558B2F',
  '대학교':'#880E4F','각종대학(대학)':'#4E342E','전공대학':'#AD1457'
};

// ── 마커 레이어
let markers = {};
let selected = null;

function getUrl(d) {
  if (d.info && d.info.startsWith('http')) return { url: d.info, label: '대학 및 입시정보' };
  if (d.home && d.home.length > 4) return { url: d.home, label: '홈페이지' };
  return null;
}

function buildPopup(d) {
  const u = getUrl(d);
  let links = '';
  if (u) links += `<a href="${u.url}" target="_blank" class="popup-link">${u.label}</a>`;
  if (d.home && d.home.length > 4 && d.info && d.info.startsWith('http'))
    links += `<a href="${d.home}" target="_blank" class="popup-link home">홈페이지</a>`;
  return `<div class="popup-name">${d.name}</div>
<div class="popup-meta">${d.type} · ${d.region} · ${d.establish}</div>
<div>${links || '<span style="color:#aaa;font-size:.8em;">링크 없음</span>'}</div>`;
}

function showSidebar(d) {
  const u = getUrl(d);
  const infoBtn = d.info && d.info.startsWith('http')
    ? `<a href="${d.info}" target="_blank" class="btn-link btn-info">📋 입시정보</a>`
    : '';
  const homeBtn = d.home && d.home.length > 4
    ? `<a href="${d.home}" target="_blank" class="btn-link btn-home">🌐 홈페이지</a>`
    : `<span class="btn-link btn-dis">홈페이지 없음</span>`;
  document.getElementById('sidebar-content').innerHTML = `
    <div class="uni-card">
      <div class="utype">${d.type}</div>
      <div class="uname">${d.name}</div>
      <div class="umeta">
        <span class="meta-badge">📍 ${d.region}</span>
        <span class="meta-badge">🏛️ ${d.establish}</span>
      </div>
      <div class="btn-row">${infoBtn}${homeBtn}</div>
    </div>`;
}

let allMarkers = L.layerGroup().addTo(map);
let markerMap = {};

function renderMarkers(filtered) {
  allMarkers.clearLayers();
  markerMap = {};
  document.getElementById('countNum').textContent = filtered.length;
  filtered.forEach(d => {
    if (!d.lat || !d.lng) return;
    const color = typeColor[d.type] || '#555';
    const m = L.marker([d.lat, d.lng], { icon: makeIcon(color, false) })
    .bindPopup(buildPopup(d), { maxWidth: 260 })
    .bindTooltip(d.name, { permanent: false, direction: 'top', offset: [0, -20], className: 'uni-tooltip' });
    m.on('click', () => {
      if (selected && markerMap[selected]) {
        const pd = DATA.find(x=>x.name===selected);
        if (pd) markerMap[selected].setIcon(makeIcon(typeColor[pd.type]||'#555', false));
      }
      selected = d.name;
      m.setIcon(makeIcon(color, true));
      showSidebar(d);
    });
    allMarkers.addLayer(m);
    markerMap[d.name] = m;
  });
}

// ── 필터 적용
function getFiltered() {
  const q  = document.getElementById('searchInput').value.trim().toLowerCase();
  const rg = document.getElementById('filtRegion').value;
  const ty = document.getElementById('filtType').value;
  const es = document.getElementById('filtEstab').value;
  return DATA.filter(d =>
    (!q || d.name.toLowerCase().includes(q) || (q.length >= 2 && d.name.includes(q))) &&
    (!rg || d.region === rg) &&
    (!ty || d.type === ty) &&
    (!es || d.establish === es)
  );
}

document.getElementById('filtRegion').addEventListener('change', () => renderMarkers(getFiltered()));
document.getElementById('filtType').addEventListener('change', () => renderMarkers(getFiltered()));
document.getElementById('filtEstab').addEventListener('change', () => renderMarkers(getFiltered()));

// ── 검색 자동완성
const sugEl = document.getElementById('suggestions');
const inputEl = document.getElementById('searchInput');
let sugIdx = -1;

inputEl.addEventListener('input', () => {
  const q = inputEl.value.trim();
  document.getElementById('resetBtn').style.display = q.length > 0 ? 'inline-block' : 'none';
  renderMarkers(getFiltered());
  if (q.length < 2) { sugEl.style.display='none'; return; }
  const hits = DATA.filter(d => d.name.includes(q)).slice(0, 12);
  if (!hits.length) { sugEl.style.display='none'; return; }
  sugEl.innerHTML = hits.map((d,i) =>
    `<div class="sug-item" data-idx="${i}" data-name="${d.name}">
      <span>${d.name}</span>
      <span class="sug-tag">${d.region}</span>
    </div>`).join('');
  sugEl.style.display = 'block';
  sugIdx = -1;
  sugEl.querySelectorAll('.sug-item').forEach(el => {
    el.addEventListener('click', () => selectName(el.dataset.name));
  });
});

inputEl.addEventListener('keydown', e => {
  const items = sugEl.querySelectorAll('.sug-item');
  if (e.key==='ArrowDown') { sugIdx=Math.min(sugIdx+1,items.length-1); highlight(items); e.preventDefault(); }
  else if (e.key==='ArrowUp') { sugIdx=Math.max(sugIdx-1,0); highlight(items); e.preventDefault(); }
  else if (e.key==='Enter') {
    if (sugIdx>=0 && items[sugIdx]) selectName(items[sugIdx].dataset.name);
    else if (items.length>0) selectName(items[0].dataset.name);
    sugEl.style.display='none';
  } else if (e.key==='Escape') { sugEl.style.display='none'; }
});

function highlight(items) {
  items.forEach((el,i) => el.classList.toggle('active', i===sugIdx));
}

document.addEventListener('click', e => {
  if (!e.target.closest('#search-wrap')) sugEl.style.display='none';
});

function selectName(name) {
  inputEl.value = name;
  sugEl.style.display = 'none';
  const d = DATA.find(x => x.name === name);
  if (!d) return;
  renderMarkers(getFiltered());
  map.setView([d.lat, d.lng], 15);
  if (selected && markerMap[selected]) {
    const pd = DATA.find(x=>x.name===selected);
    if (pd) markerMap[selected].setIcon(makeIcon(typeColor[pd.type]||'#555', false));
  }
  selected = name;
  const m = markerMap[name];
  if (m) {
    const color = typeColor[d.type] || '#555';
    m.setIcon(makeIcon(color, true));
    m.openPopup();
  }
  showSidebar(d);
}

// ── 초기 렌더
renderMarkers(DATA);

// ── 초기화
function resetSearch() {
  document.getElementById('searchInput').value = '';
  document.getElementById('resetBtn').style.display = 'none';
  document.getElementById('filtRegion').value = '';
  document.getElementById('filtType').value = '';
  document.getElementById('filtEstab').value = '';
  document.getElementById('sidebar-content').innerHTML = `
    <div class="empty-state">
      <div class="icon">🗺️</div>
      지도에서 마커를 클릭하거나<br>대학명을 검색해 보세요.
    </div>`;
  selected = null;
  renderMarkers(DATA);
  map.setView([36.5, 127.8], 7);
}

</script>

</html>
